# SonarQube project configuration for go-college
sonar.projectKey=go-college
sonar.projectName=go-college
sonar.projectVersion=1.0

# Source layout
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Exclude generated code, build output, deps, migrations, logs
sonar.exclusions=bin/**,logs/**,db/migrations/**,api/openapi/docs.go,**/*.gen.go,**/vendor/**

# Go settings
sonar.go.exclusions=**/vendor/**
sonar.sourceEncoding=UTF-8

# Local server (set at scan time via -Dsonar.host.url / -Dsonar.token)
sonar.host.url=http://localhost:9000
