definitions:
  dto.CreateCollegeRequest:
    properties:
      active:
        type: boolean
      name:
        type: string
      nim:
        type: string
      semester:
        type: integer
      sks:
        type: integer
    type: object
  dto.CreateCourseRequest:
    properties:
      code:
        type: string
      name:
        type: string
      sks:
        type: integer
    type: object
  dto.CreateEnrollmentRequest:
    properties:
      course:
        type: string
      nim:
        type: string
      semester:
        type: integer
    type: object
  dto.HTTPErrorResp:
    properties:
      metadata:
        $ref: '#/definitions/dto.Meta'
    type: object
  dto.HttpSuccessResp:
    properties:
      data:
        x-order: "1"
      metadata:
        allOf:
        - $ref: '#/definitions/dto.Meta'
