      timestamp:
        type: string
        x-order: "5"
    type: object
  dto.PaginatedResp:
    properties:
      items: {}
      page:
        type: integer
      page_count:
        type: integer
      per_page:
        type: integer
      total_count:
        type: integer
    type: object
  dto.UpdateCollegeRequest:
    properties:
      active:
        type: boolean
      name:
        type: string
      semester:
        type: integer
      sks:
        type: integer
    type: object
  dto.UpdateCourseRequest:
    properties:
      name:
        type: string
      sks:
        type: integer
    type: object
  dto.UpdateEnrollmentRequest:
    properties:
      grade:
        type: string
      semester:
        type: integer
    type: object
  entity.College:
    properties:
      active:
