host: localhost:8181
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: RESTful API for managing colleges, courses, and enrollments.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go-College API
  version: 1.0.0
paths:
  /college/{nim}:
    delete:
      description: Delete a college identified by NIM
      parameters:
      - description: College NIM
        in: path
        name: nim
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HttpSuccessResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Delete a college
      tags:
      - colleges
    put:
      consumes:
      - application/json
      description: Update an existing college identified by NIM
      parameters:
      - description: College NIM
        in: path
        name: nim
        required: true
        type: string
      - description: College data
        in: body
        name: college
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCollegeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/entity.College'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Update a college
      tags:
      - colleges
  /college/all:
    get:
      description: Retrieve college records with optional filtering, sorting and pagination
      parameters:
      - description: Filter by name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by semester
        in: query
        name: semester
        type: integer
      - description: Sort field (nim, name, semester, sks)
        in: query
        name: sort_by
        type: string
      - description: Sort direction (asc, desc)
        in: query
        name: sort_dir
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginatedResp'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: List colleges
      tags:
      - colleges
  /college/create:
    post:
      consumes:
      - application/json
      description: Create a new college record
      parameters:
      - description: College data
        in: body
        name: college
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCollegeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/entity.College'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Create a new college
      tags:
      - colleges
  /course/{code}:
    delete:
      description: Delete a course identified by code
      parameters:
      - description: Course code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HttpSuccessResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Delete a course
      tags:
      - courses
    put:
      consumes:
      - application/json
      description: Update an existing course identified by code
      parameters:
      - description: Course code
        in: path
        name: code
        required: true
        type: string
      - description: Course data
        in: body
        name: course
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCourseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/entity.Course'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Update a course
      tags:
      - courses
  /course/all:
    get:
      description: Retrieve course records with optional filtering, sorting and pagination
      parameters:
      - description: Filter by code (partial match)
        in: query
        name: code
        type: string
      - description: Filter by name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by SKS
        in: query
        name: sks
        type: integer
      - description: Sort field (code, name, sks)
        in: query
        name: sort_by
        type: string
      - description: Sort direction (asc, desc)
        in: query
        name: sort_dir
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginatedResp'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: List courses
      tags:
      - courses
  /course/create:
    post:
      consumes:
      - application/json
      description: Create a new course record
      parameters:
      - description: Course data
        in: body
        name: course
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/entity.Course'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Create a new course
      tags:
      - courses
  /enrollment/{id}:
    delete:
      description: Delete an enrollment identified by its id
      parameters:
      - description: Enrollment id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HttpSuccessResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Delete an enrollment
      tags:
      - enrollments
  /enrollment/{nim}/{course}:
    put:
      consumes:
      - application/json
      description: Update semester and grade for the enrollment identified by NIM
        and course code
      parameters:
      - description: College NIM
        in: path
        name: nim
        required: true
        type: string
      - description: Course code
        in: path
        name: course
        required: true
        type: string
      - description: Enrollment data
        in: body
        name: enrollment
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateEnrollmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HttpSuccessResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Update an enrollment
      tags:
      - enrollments
  /enrollment/create:
    post:
      consumes:
      - application/json
      description: Enroll a college (NIM) into a course for a semester
      parameters:
      - description: Enrollment data
        in: body
        name: enrollment
        required: true
        schema:
          $ref: '#/definitions/dto.CreateEnrollmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  $ref: '#/definitions/entity.Enrollment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: Create a new enrollment
      tags:
      - enrollments
  /enrollment/nim/{nim}:
    get:
      description: Retrieve all enrollments (with course detail) for a given college
        NIM
      parameters:
      - description: College NIM
        in: path
        name: nim
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.HttpSuccessResp'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.EnrollmentDetail'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPErrorResp'
      summary: List enrollment details by NIM
      tags:
      - enrollments
schemes:
- http
- https
swagger: "2.0"
